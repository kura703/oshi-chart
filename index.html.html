<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="推し相関図">
<meta name="theme-color" content="#FF93A8">
<title>推し相関図メーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBEFE2;
    --board-dot:#EAD3BC;
    --pink:#FF93A8;
    --pink-deep:#FF6E8C;
    --mint:#8FE0BE;
    --lavender:#C6AEF2;
    --ink:#5B4636;
    --tape:#FFE79E;
    --cream:#FFFCF6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  button{-webkit-appearance:none;appearance:none;font-family:inherit;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);font-family:'Zen Maru Gothic',sans-serif;position:fixed;width:100%;overscroll-behavior:none;touch-action:none;}

  #toolbar{
    position:fixed;top:0;left:0;right:0;height:64px;z-index:60;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:linear-gradient(180deg,#FFF7EC,rgba(255,247,236,.85));
    border-bottom:3px dashed var(--pink);
    padding-top:env(safe-area-inset-top);
  }
  #toolbar h1{
    font-family:'Mochiy Pop One',cursive;font-size:16px;color:var(--pink-deep);margin:2px 0 0;
    letter-spacing:.5px;
  }
  #toolbar p{margin:0;font-size:10px;color:#a98d76;}

  #viewport{
    position:absolute;top:64px;left:0;right:0;bottom:0;overflow:hidden;
    touch-action:none;
    background-image:
      radial-gradient(circle,var(--board-dot) 1.5px,transparent 1.6px);
    background-size:22px 22px;
    background-color:#FBEFE2;
  }
  #world{
    position:absolute;top:0;left:0;transform-origin:0 0;
  }

  .hint{
    position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
    text-align:center;color:#c9a98d;font-family:'Mochiy Pop One';font-size:14px;
    pointer-events:none;line-height:2;width:240px;
  }

  /* --- Chekki card --- */
  .card{
    position:absolute;width:148px;background:var(--cream);
    padding:10px 10px 12px;border-radius:3px;
    box-shadow:0 6px 14px rgba(90,60,40,.28),0 2px 3px rgba(90,60,40,.18);
    transform:rotate(var(--rot));
    transition:box-shadow .18s ease, transform .18s ease;
    touch-action:none;user-select:none;cursor:pointer;
    -webkit-touch-callout:none;-webkit-user-select:none;
  }
  .card.lifted{box-shadow:0 20px 34px rgba(90,60,40,.4);transform:rotate(var(--rot)) scale(1.07);z-index:80;}
  .card.drop-target{outline:3px dashed var(--pink-deep);outline-offset:5px;border-radius:6px;}
  .tape{position:absolute;width:52px;height:20px;
    background:linear-gradient(120deg,rgba(255,231,158,.9),rgba(255,231,158,.55));
    box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .tape-a{top:-9px;left:-13px;transform:rotate(-38deg);}
  .tape-b{top:-9px;right:-13px;transform:rotate(38deg);}
  .photo{width:100%;aspect-ratio:1/1;background:#f2e8db;border-radius:2px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .plus{font-size:38px;color:#d7b79b;font-family:'Mochiy Pop One';line-height:1;}
  .cname{margin-top:8px;font-family:'Mochiy Pop One';font-size:12.5px;color:var(--ink);
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cname.empty{color:#c9b6a4;}
  .cdesc{margin-top:2px;font-size:9.5px;color:#a08a75;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* --- arrows / labels --- */
  #arrows-layer{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  .arrow-path{stroke:#5B4636;stroke-width:2.6;fill:none;stroke-linecap:round;
    transition:opacity .18s ease, transform .18s ease;transform-box:fill-box;transform-origin:center;}
  .arrow-sketch{stroke:#5B4636;stroke-width:1.6;opacity:.35;}
  .arrow-hit{fill:none;stroke:transparent;stroke-width:30;pointer-events:stroke;cursor:grab;
    transition:opacity .18s ease, transform .18s ease;transform-box:fill-box;transform-origin:center;}
  .arrow-path.popping,.arrow-hit.popping{opacity:0;transform:scale(1.6);}
  #temp-line{stroke:var(--pink-deep);stroke-width:2.4;stroke-dasharray:6 6;fill:none;display:none;}

  #labels-layer{position:absolute;top:0;left:0;}
  .arrow-label-wrap{position:absolute;transform:translate(-50%,-50%);
    transition:opacity .18s ease, transform .18s ease;}
  .arrow-label-wrap.popping{opacity:0;transform:translate(-50%,-50%) scale(1.6);}
  .arrow-label{
    display:inline-block;white-space:nowrap;background:none;border:none;
    padding:0 4px;font-size:16px;font-weight:700;color:#5B4636;text-align:center;outline:none;
    font-family:'Yomogi',cursive;-webkit-text-stroke:0.4px #5B4636;
    text-shadow:0 0 6px var(--bg),0 0 6px var(--bg),0 0 4px var(--bg);
  }
  .arrow-label:empty:before{content:'♡関係性';color:#c2ab97;}

  /* --- floating add button --- */
  #add-card-btn{
    position:fixed;right:18px;bottom:24px;z-index:60;width:58px;height:58px;border-radius:50%;
    background:var(--pink-deep);color:#fff;border:none;font-size:28px;font-family:'Mochiy Pop One';
    box-shadow:0 6px 16px rgba(255,110,140,.5);
  }

  /* --- modals --- */
  .modal-overlay{position:fixed;inset:0;background:rgba(75,55,40,.45);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.hidden{display:none;}
  .modal-card{background:var(--cream);width:100%;max-width:320px;border-radius:16px;padding:20px 18px 18px;
    position:relative;box-shadow:0 14px 40px rgba(0,0,0,.35);}
  .modal-close{position:absolute;top:10px;right:12px;border:none;background:none;font-size:22px;color:#b39880;}
  .modal-photo{width:100%;aspect-ratio:1/1;background:#f2e8db;border-radius:8px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;margin-top:6px;}
  .modal-photo img{width:100%;height:100%;object-fit:cover;}
  .modal-photo .plus{font-size:46px;}
  #modal-name{width:100%;margin-top:14px;font-family:'Mochiy Pop One';font-size:16px;color:var(--ink);
    border:none;border-bottom:2px dashed var(--pink);padding:6px 2px;background:transparent;-webkit-appearance:none;border-radius:0;}
  #modal-desc{width:100%;margin-top:10px;min-height:70px;font-family:'Zen Maru Gothic';font-size:16px;
    color:var(--ink);border:2px solid #f0e2d2;border-radius:10px;padding:8px;resize:vertical;background:#fffdf9;-webkit-appearance:none;}
  #modal-name:focus,#modal-desc:focus{outline:none;border-color:var(--pink-deep);}
  .danger-btn{width:100%;margin-top:14px;padding:10px;border:none;border-radius:10px;
    background:#f6e2e2;color:#c1546b;font-family:'Zen Maru Gothic';font-weight:700;font-size:12.5px;}
  .danger-btn.armed{background:var(--pink-deep);color:#fff;}

  .crop-box{background:var(--cream);border-radius:16px;padding:18px;width:100%;max-width:320px;text-align:center;}
  .crop-frame{width:260px;height:260px;margin:0 auto;overflow:hidden;border-radius:8px;
    background:#222;position:relative;touch-action:none;border:3px solid var(--pink);}
  .crop-frame img{position:absolute;top:0;left:0;max-width:none;}
  .crop-hint{font-size:11px;color:#a98d76;margin:10px 0 0;}
  .crop-actions{display:flex;gap:10px;margin-top:14px;}
  .crop-actions button{flex:1;padding:11px;border:none;border-radius:10px;font-family:'Mochiy Pop One';font-size:13px;}
  #crop-cancel{background:#eee2d4;color:#8a7663;}
  #crop-confirm{background:var(--pink-deep);color:#fff;}
</style>
</head>
<body>

<div id="toolbar">
  <h1>♡ 推し相関図メーカー ♡</h1>
  <p>チェキを並べて、みんなの関係をつなげよう</p>
</div>

<div id="viewport">
  <div id="world">
    <svg id="arrows-layer">
      <defs>
        <marker id="arrowhead" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
          <path d="M0,0 L9,4.5 L0,9 L2.5,4.5 Z" fill="#5B4636"/>
        </marker>
        <marker id="arrowhead-start" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto-start-reverse">
          <path d="M0,0 L9,4.5 L0,9 L2.5,4.5 Z" fill="#5B4636"/>
        </marker>
      </defs>
      <path id="temp-line"></path>
    </svg>
    <div id="cards-layer"></div>
    <div id="labels-layer"></div>
  </div>
  <div class="hint" id="hint">＋ボタンでキャラクターを追加してね<br>カードをタップで編集／1秒長押しで移動<br>カード同士をスワイプでつなげてね</div>
</div>

<button id="add-card-btn">＋</button>
<input type="file" id="file-input" accept="image/*" hidden>

<!-- card edit modal -->
<div class="modal-overlay hidden" id="card-modal">
  <div class="modal-card">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-photo" id="modal-photo">
      <img id="modal-img" style="display:none">
      <div class="plus" id="modal-plus">＋</div>
    </div>
    <input id="modal-name" placeholder="キャラ名">
    <textarea id="modal-desc" placeholder="キャラの説明・設定など…"></textarea>
    <button class="danger-btn" id="modal-delete">このカードを削除</button>
  </div>
</div>

<!-- crop modal -->
<div class="modal-overlay hidden" id="crop-modal">
  <div class="crop-box">
    <div class="crop-frame" id="crop-frame">
      <img id="crop-img" draggable="false">
    </div>
    <p class="crop-hint">指でずらす・2本指で拡大縮小できます</p>
    <div class="crop-actions">
      <button id="crop-cancel">キャンセル</button>
      <button id="crop-confirm">きめる！</button>
    </div>
  </div>
</div>

<script>
(function(){
  const viewport=document.getElementById('viewport');
  const world=document.getElementById('world');
  const cardsLayer=document.getElementById('cards-layer');
  const arrowsLayer=document.getElementById('arrows-layer');
  const labelsLayer=document.getElementById('labels-layer');
  const tempLine=document.getElementById('temp-line');
  const hint=document.getElementById('hint');

  const WORLD_W=2600, WORLD_H=1900;
  const CARD_W=148, CARD_H=196;

  let cards=[];
  let connections=[];
  let idCounter=1;
  const genId=()=>'id'+(idCounter++);

  let scale=0.6, tx=0, ty=0;

  function applyWorldTransform(){
    world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }
  function initView(){
    const vw=viewport.clientWidth, vh=viewport.clientHeight;
    tx=(vw-WORLD_W*scale)/2;
    ty=(vh-WORLD_H*scale)/2;
    applyWorldTransform();
  }
  initView();

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------------- render ---------------- */
  let liftedId=null;

  function renderCards(){
    cardsLayer.innerHTML='';
    cards.forEach(c=>{
      const el=document.createElement('div');
      el.className='card'+(c.id===liftedId?' lifted':'');
      el.style.left=c.x+'px';
      el.style.top=c.y+'px';
      el.style.setProperty('--rot',c.rot+'deg');
      el.dataset.id=c.id;
      el.innerHTML=`
        <span class="tape tape-a"></span><span class="tape tape-b"></span>
        <div class="photo">${c.img?`<img src="${c.img}">`:`<div class="plus" data-add="1">＋</div>`}</div>
        <div class="cname${c.name?'':' empty'}">${c.name?escapeHtml(c.name):'名前を入力'}</div>
        <div class="cdesc">${escapeHtml(c.desc)}</div>
      `;
      cardsLayer.appendChild(el);
    });
    hint.style.display=cards.length?'none':'block';
  }

  function cardCenter(id){
    const c=cards.find(cc=>cc.id===id);
    if(!c) return {x:0,y:0};
    return {x:c.x+CARD_W/2,y:c.y+CARD_H/2};
  }

  function renderArrows(){
    arrowsLayer.querySelectorAll('.arrow-path').forEach(n=>n.remove());
    labelsLayer.innerHTML='';
    const groups={};
    connections.forEach(c=>{
      const key=[c.from,c.to].sort().join('_');
      (groups[key]=groups[key]||[]).push(c);
    });
    Object.values(groups).forEach(group=>{
      if(group.length===1){
        drawArrow(group[0],true,0,null);
      }else{
        // 1本目(奇数目)の向きを基準にして、2本目(偶数目)以降も同じ弧を平行移動しただけの形にする
        const first=group[0];
        const fa=cardCenter(first.from), fb=cardCenter(first.to);
        const fddx=fb.x-fa.x, fddy=fb.y-fa.y, flen=Math.hypot(fddx,fddy)||1;
        const refNormal={nx:fddy/flen, ny:-fddx/flen};
        group.forEach((c,i)=>{
          drawArrow(c,false,14+i*28,refNormal);
        });
      }
    });
  }

  // 文字列から安定した疑似乱数(-1〜1)を作る(手描き風の揺れ・傾き用)
  function seededRand(str){
    let h=0;
    for(let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))|0; }
    return ((Math.abs(h)%1000)/1000)*2-1;
  }

  // カードの矩形の縁+余白の位置まで線を引っ込める(矢尻がカードに隠れないように)
  function trimToCardEdge(center,towardCenter,margin){
    const dx=towardCenter.x-center.x, dy=towardCenter.y-center.y;
    if(dx===0 && dy===0) return {x:center.x,y:center.y};
    const hw=CARD_W/2, hh=CARD_H/2;
    const tx=dx!==0?hw/Math.abs(dx):Infinity;
    const ty=dy!==0?hh/Math.abs(dy):Infinity;
    const t=Math.min(tx,ty);
    const len=Math.hypot(dx,dy);
    const ux=dx/len, uy=dy/len;
    const dist=t*len+margin;
    return {x:center.x+ux*dist, y:center.y+uy*dist};
  }

  const ARC_BOW=18; // 弧のふくらみ(すべての矢印で共通の値にすることで平行になる)

  function lerpPt(A,B,t){ return {x:A.x+(B.x-A.x)*t, y:A.y+(B.y-A.y)*t}; }
  function bezierPoint(P0,P1,P2,t){
    const mt=1-t;
    return {x:mt*mt*P0.x+2*mt*t*P1.x+t*t*P2.x, y:mt*mt*P0.y+2*mt*t*P1.y+t*t*P2.y};
  }
  // 2次ベジェを t で分割し、0〜t 側(左側)の制御点を返す
  function bezierLeft(P0,P1,P2,t){
    const Q1=lerpPt(P0,P1,t), M=lerpPt(P1,P2,t);
    return [P0,Q1,lerpPt(Q1,M,t)];
  }
  // 2次ベジェを t で分割し、t〜1 側(右側)の制御点を返す
  function bezierRight(P0,P1,P2,t){
    const M=lerpPt(P0,P1,t), R1=lerpPt(P1,P2,t);
    return [lerpPt(M,R1,t),R1,P2];
  }
  function segD(pts){ return `M${pts[0].x},${pts[0].y} Q${pts[1].x},${pts[1].y} ${pts[2].x},${pts[2].y}`; }

  function drawArrow(conn,bidir,laneOffset,fixedNormal){
    const aCenter=cardCenter(conn.from), bCenter=cardCenter(conn.to);
    const a0=trimToCardEdge(aCenter,bCenter,10);
    const b0=trimToCardEdge(bCenter,aCenter,10);
    const ddx=bCenter.x-aCenter.x, ddy=bCenter.y-aCenter.y;
    const len=Math.hypot(ddx,ddy)||1;
    // 進行方向を90度回転:右向き→上、上向き→左、にオフセットが揃うようにする
    // (向かい合う2本の場合は fixedNormal で1本目の向きに揃える)
    const nx=fixedNormal?fixedNormal.nx:ddy/len;
    const ny=fixedNormal?fixedNormal.ny:-ddx/len;

    // a,b,制御点の3点すべてを同じ量だけ平行移動することで、複数の矢印が
    // 完全に平行な(合同で位置だけ違う)弧になるようにする
    const a={x:a0.x+nx*laneOffset, y:a0.y+ny*laneOffset};
    const b={x:b0.x+nx*laneOffset, y:b0.y+ny*laneOffset};
    const midX=(a.x+b.x)/2, midY=(a.y+b.y)/2;
    const cx=midX+nx*ARC_BOW, cy=midY+ny*ARC_BOW;
    const control={x:cx,y:cy};
    const midPoint=bezierPoint(a,control,b,0.5);

    // 関係性ラベル(背景・枠なし、常に横書きの文字のみ)を弧の真ん中に配置
    const wrap=document.createElement('div');
    wrap.className='arrow-label-wrap';
    wrap.style.left=midPoint.x+'px';
    wrap.style.top=midPoint.y+'px';
    wrap.innerHTML=`<div class="arrow-label" contenteditable="true" data-conn="${conn.id}">${escapeHtml(conn.label)}</div><button class="label-del" data-conn="${conn.id}">×</button>`;
    labelsLayer.appendChild(wrap);
    const labelEl=wrap.querySelector('.arrow-label');
    const gapWidth=Math.max(labelEl.offsetWidth+16, 26);
    let halfGapT=(gapWidth/2)/len;
    halfGapT=Math.min(0.42,Math.max(0.06,halfGapT));
    const t1=0.5-halfGapT, t2=0.5+halfGapT;

    const leftSeg=bezierLeft(a,control,b,t1);
    const rightSeg=bezierRight(a,control,b,t2);

    // 下敷きになる、少しずれた手描き風のなぞり線(ペアで同じ揺れ方になるよう、カードの組み合わせをシードにする)
    const pairKey=[conn.from,conn.to].sort().join('_');
    const jx=seededRand(pairKey+'j1')*6, jy=seededRand(pairKey+'j2')*6;
    [leftSeg,rightSeg].forEach(seg=>{
      const sketch=document.createElementNS('http://www.w3.org/2000/svg','path');
      sketch.setAttribute('d',`M${seg[0].x+jx*0.3},${seg[0].y+jy*0.3} Q${seg[1].x+jx},${seg[1].y+jy} ${seg[2].x-jx*0.3},${seg[2].y-jy*0.3}`);
      sketch.setAttribute('class','arrow-path arrow-sketch');
      arrowsLayer.appendChild(sketch);
    });

    const leftPath=document.createElementNS('http://www.w3.org/2000/svg','path');
    leftPath.setAttribute('d',segD(leftSeg));
    leftPath.setAttribute('class','arrow-path');
    if(bidir) leftPath.setAttribute('marker-start','url(#arrowhead-start)');
    arrowsLayer.appendChild(leftPath);

    const rightPath=document.createElementNS('http://www.w3.org/2000/svg','path');
    rightPath.setAttribute('d',segD(rightSeg));
    rightPath.setAttribute('class','arrow-path');
    rightPath.setAttribute('marker-end','url(#arrowhead)');
    arrowsLayer.appendChild(rightPath);
  }

  function renderAll(){ renderCards(); renderArrows(); }
  renderAll();

  labelsLayer.addEventListener('input',e=>{
    if(e.target.classList.contains('arrow-label')){
      const conn=connections.find(c=>c.id===e.target.dataset.conn);
      if(conn) conn.label=e.target.innerText.trim();
    }
  });
  labelsLayer.addEventListener('click',e=>{
    if(e.target.classList.contains('label-del')){
      connections=connections.filter(c=>c.id!==e.target.dataset.conn);
      renderArrows();
    }
  });

  /* ---------------- pointer / gesture handling ---------------- */
  let pointers=new Map();
  let pinch=null;
  let cardGesture=null;

  function worldPointFromClient(clientX,clientY){
    const rect=viewport.getBoundingClientRect();
    const sx=clientX-rect.left, sy=clientY-rect.top;
    return {x:(sx-tx)/scale, y:(sy-ty)/scale};
  }

  function highlightTarget(id){
    cardsLayer.querySelectorAll('.card').forEach(el=>{
      el.classList.toggle('drop-target', el.dataset.id===id);
    });
  }
  function updateTempLine(originId,wp){
    const c=cardCenter(originId);
    tempLine.setAttribute('d',`M${c.x},${c.y} L${wp.x},${wp.y}`);
    tempLine.style.display='block';
  }
  function clearTempLine(){ tempLine.style.display='none'; }

  function addConnection(fromId,toId){
    const conn={id:genId(),from:fromId,to:toId,label:''};
    connections.push(conn);
    renderArrows();
    setTimeout(()=>{
      const el=labelsLayer.querySelector(`.arrow-label[data-conn="${conn.id}"]`);
      if(el){ el.focus(); }
    },30);
  }

  viewport.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove, {passive:false});
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onCancel);

  function onDown(e){
    if(e.target.closest('.arrow-label, .label-del')) return; // let native edit/tap happen

    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});

    if(pointers.size===2){
      if(cardGesture){
        clearTimeout(cardGesture.longPressTimer);
        clearTempLine();
        highlightTarget(null);
        cardGesture=null;
        liftedId=null;
        renderCards();
      }
      const ids=[...pointers.keys()];
      const p1=pointers.get(ids[0]), p2=pointers.get(ids[1]);
      const dist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      const mid={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
      const worldMid=worldPointFromClient(mid.x,mid.y);
      pinch={startDist:dist,startScale:scale,worldMid};
      e.preventDefault();
      return;
    }

    if(pointers.size===1 && !pinch){
      const cardEl=e.target.closest('.card');
      if(cardEl){
        const id=cardEl.dataset.id;
        const isPlus=!!e.target.closest('.plus');
        cardGesture={
          id, startClientX:e.clientX, startClientY:e.clientY,
          moved:false, mode:'idle', isPlus,
          longPressTimer:setTimeout(()=>{
            if(cardGesture && !cardGesture.moved){
              cardGesture.mode='move';
              liftedId=cardGesture.id;
              const liftEl=cardsLayer.querySelector(`.card[data-id="${cardGesture.id}"]`);
              if(liftEl) liftEl.classList.add('lifted');
              if(navigator.vibrate) navigator.vibrate(25);
            }
          },1000)
        };
        e.preventDefault();
      }
    }
  }

  function onMove(e){
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});

    if(pinch && pointers.size>=2){
      const ids=[...pointers.keys()].slice(0,2);
      const p1=pointers.get(ids[0]), p2=pointers.get(ids[1]);
      const dist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      const mid={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
      let newScale=pinch.startScale*(dist/pinch.startDist);
      newScale=Math.max(0.3,Math.min(2.5,newScale));
      tx=mid.x-pinch.worldMid.x*newScale;
      ty=mid.y-pinch.worldMid.y*newScale;
      scale=newScale;
      applyWorldTransform();
      e.preventDefault();
      return;
    }

    if(cardGesture){
      const dx=e.clientX-cardGesture.startClientX, dy=e.clientY-cardGesture.startClientY;
      if(!cardGesture.moved && Math.hypot(dx,dy)>10){
        cardGesture.moved=true;
        clearTimeout(cardGesture.longPressTimer);
        if(cardGesture.mode!=='move') cardGesture.mode='swipe';
      }
      if(cardGesture.mode==='move'){
        const card=cards.find(c=>c.id===cardGesture.id);
        const wp=worldPointFromClient(e.clientX,e.clientY);
        card.x=wp.x-CARD_W/2;
        card.y=wp.y-CARD_H/2;
        const el=cardsLayer.querySelector(`.card[data-id="${card.id}"]`);
        if(el){ el.style.left=card.x+'px'; el.style.top=card.y+'px'; }
        renderArrows();
      }else if(cardGesture.mode==='swipe'){
        const wp=worldPointFromClient(e.clientX,e.clientY);
        updateTempLine(cardGesture.id,wp);
        const el=document.elementFromPoint(e.clientX,e.clientY);
        const targetCard=el&&el.closest('.card');
        const targetId=(targetCard && targetCard.dataset.id!==cardGesture.id)?targetCard.dataset.id:null;
        highlightTarget(targetId);
      }
      e.preventDefault();
    }
  }

  function onUp(e){
    pointers.delete(e.pointerId);

    if(pinch){
      if(pointers.size<2) pinch=null;
      return;
    }

    if(cardGesture){
      clearTimeout(cardGesture.longPressTimer);
      if(cardGesture.mode==='swipe'){
        const el=document.elementFromPoint(e.clientX,e.clientY);
        const targetCard=el&&el.closest('.card');
        clearTempLine();
        highlightTarget(null);
        if(targetCard && targetCard.dataset.id!==cardGesture.id){
          addConnection(cardGesture.id, targetCard.dataset.id);
        }
      }else if(cardGesture.mode==='move'){
        liftedId=null;
      }else if(!cardGesture.moved){
        if(cardGesture.isPlus){ openFilePicker(cardGesture.id); }
        else{ openCardModal(cardGesture.id); }
      }
      cardGesture=null;
      renderCards();
    }
  }

  function onCancel(e){
    pointers.delete(e.pointerId);
    if(pinch){
      if(pointers.size<2) pinch=null;
    }
    if(cardGesture){
      clearTimeout(cardGesture.longPressTimer);
      clearTempLine();
      highlightTarget(null);
      liftedId=null;
      cardGesture=null;
      renderCards();
    }
  }

  /* ---------------- add / delete card ---------------- */
  document.getElementById('add-card-btn').addEventListener('click',()=>{
    const vw=viewport.clientWidth, vh=viewport.clientHeight;
    const centerScreen={x:vw/2,y:vh/2};
    const wp={x:(centerScreen.x-tx)/scale, y:(centerScreen.y-ty)/scale};
    const jitter=()=>(Math.random()-0.5)*60;
    const card={
      id:genId(),
      x:wp.x-CARD_W/2+jitter(), y:wp.y-CARD_H/2+jitter(),
      rot:(Math.random()*12-6).toFixed(1),
      name:'', desc:'', img:null
    };
    cards.push(card);
    renderAll();
    openCardModal(card.id);
  });

  function deleteCard(id){
    cards=cards.filter(c=>c.id!==id);
    connections=connections.filter(c=>c.from!==id && c.to!==id);
    renderAll();
  }

  /* ---------------- card edit modal ---------------- */
  const cardModal=document.getElementById('card-modal');
  const modalImg=document.getElementById('modal-img');
  const modalPlus=document.getElementById('modal-plus');
  const modalName=document.getElementById('modal-name');
  const modalDesc=document.getElementById('modal-desc');
  const modalDeleteBtn=document.getElementById('modal-delete');
  let currentEditId=null;
  let deleteArmed=false;

  function openCardModal(id){
    currentEditId=id;
    const c=cards.find(cc=>cc.id===id);
    if(!c) return;
    modalName.value=c.name;
    modalDesc.value=c.desc;
    if(c.img){ modalImg.src=c.img; modalImg.style.display='block'; modalPlus.style.display='none'; }
    else{ modalImg.style.display='none'; modalPlus.style.display='block'; }
    deleteArmed=false;
    modalDeleteBtn.textContent='このカードを削除';
    modalDeleteBtn.classList.remove('armed');
    cardModal.classList.remove('hidden');
  }
  function closeCardModal(){
    cardModal.classList.add('hidden');
    renderAll();
  }
  document.getElementById('modal-close').addEventListener('click', closeCardModal);
  cardModal.addEventListener('click',e=>{ if(e.target===cardModal) closeCardModal(); });

  modalName.addEventListener('input',()=>{
    const c=cards.find(cc=>cc.id===currentEditId); if(c) c.name=modalName.value;
  });
  modalDesc.addEventListener('input',()=>{
    const c=cards.find(cc=>cc.id===currentEditId); if(c) c.desc=modalDesc.value;
  });
  document.getElementById('modal-photo').addEventListener('click',()=>{
    if(currentEditId) openFilePicker(currentEditId);
  });
  modalDeleteBtn.addEventListener('click',()=>{
    if(!deleteArmed){
      deleteArmed=true;
      modalDeleteBtn.textContent='もう一度タップで削除';
      modalDeleteBtn.classList.add('armed');
      setTimeout(()=>{
        deleteArmed=false;
        modalDeleteBtn.textContent='このカードを削除';
        modalDeleteBtn.classList.remove('armed');
      },3000);
    }else{
      deleteCard(currentEditId);
      cardModal.classList.add('hidden');
    }
  });

  /* ---------------- file picker & crop ---------------- */
  const fileInput=document.getElementById('file-input');
  function openFilePicker(id){
    currentEditId=id;
    fileInput.click();
  }
  fileInput.addEventListener('change',e=>{
    const file=e.target.files[0];
    fileInput.value='';
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>openCropModal(ev.target.result);
    reader.readAsDataURL(file);
  });

  const cropModal=document.getElementById('crop-modal');
  const cropFrame=document.getElementById('crop-frame');
  const cropImg=document.getElementById('crop-img');
  const FRAME=260;
  let cropScale=1, cropX=0, cropY=0, cropBaseScale=1, natW=0, natH=0;

  function openCropModal(dataUrl){
    cropImg.src=dataUrl;
    cropModal.classList.remove('hidden');
  }
  cropImg.onload=()=>{
    natW=cropImg.naturalWidth; natH=cropImg.naturalHeight;
    cropBaseScale=Math.max(FRAME/natW, FRAME/natH);
    cropScale=cropBaseScale;
    cropX=(FRAME-natW*cropScale)/2;
    cropY=(FRAME-natH*cropScale)/2;
    applyCropTransform();
  };
  function applyCropTransform(){
    cropImg.style.width=natW+'px';
    cropImg.style.height=natH+'px';
    cropImg.style.transformOrigin='0 0';
    cropImg.style.transform=`translate(${cropX}px,${cropY}px) scale(${cropScale})`;
  }

  let cropPointers=new Map();
  let cropDrag=null, cropPinch=null;
  function frameXY(clientX,clientY){
    const r=cropFrame.getBoundingClientRect();
    return {x:clientX-r.left, y:clientY-r.top};
  }
  cropFrame.addEventListener('pointerdown',e=>{
    cropPointers.set(e.pointerId, frameXY(e.clientX,e.clientY));
    if(cropPointers.size===2){
      cropDrag=null;
      const ids=[...cropPointers.keys()];
      const p1=cropPointers.get(ids[0]), p2=cropPointers.get(ids[1]);
      const dist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      const mid={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
      const imgPoint={x:(mid.x-cropX)/cropScale, y:(mid.y-cropY)/cropScale};
      cropPinch={startDist:dist,startScale:cropScale,imgPoint};
    }else if(cropPointers.size===1){
      cropDrag={startX:cropPointers.get(e.pointerId).x, startY:cropPointers.get(e.pointerId).y, origX:cropX, origY:cropY};
    }
    e.preventDefault();
  });
  window.addEventListener('pointermove',e=>{
    if(!cropPointers.has(e.pointerId)) return;
    cropPointers.set(e.pointerId, frameXY(e.clientX,e.clientY));
    if(cropPinch && cropPointers.size>=2){
      const ids=[...cropPointers.keys()].slice(0,2);
      const p1=cropPointers.get(ids[0]), p2=cropPointers.get(ids[1]);
      const dist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      const mid={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
      let ns=cropPinch.startScale*(dist/cropPinch.startDist);
      ns=Math.max(cropBaseScale, Math.min(cropBaseScale*5, ns));
      cropX=mid.x-cropPinch.imgPoint.x*ns;
      cropY=mid.y-cropPinch.imgPoint.y*ns;
      cropScale=ns;
      applyCropTransform();
      e.preventDefault();
    }else if(cropDrag && cropPointers.size===1){
      const cur=cropPointers.get(e.pointerId);
      cropX=cropDrag.origX+(cur.x-cropDrag.startX);
      cropY=cropDrag.origY+(cur.y-cropDrag.startY);
      applyCropTransform();
      e.preventDefault();
    }
  },{passive:false});
  window.addEventListener('pointerup',e=>{
    if(cropPointers.has(e.pointerId)){
      cropPointers.delete(e.pointerId);
      if(cropPointers.size<2) cropPinch=null;
      if(cropPointers.size===0) cropDrag=null;
    }
  });

  document.getElementById('crop-cancel').addEventListener('click',()=>{
    cropModal.classList.add('hidden');
  });
  document.getElementById('crop-confirm').addEventListener('click',()=>{
    const sx=(0-cropX)/cropScale, sy=(0-cropY)/cropScale;
    const sw=FRAME/cropScale, sh=FRAME/cropScale;
    const canvas=document.createElement('canvas');
    canvas.width=480; canvas.height=480;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(cropImg, sx, sy, sw, sh, 0, 0, 480, 480);
    const dataUrl=canvas.toDataURL('image/jpeg',0.9);
    const c=cards.find(cc=>cc.id===currentEditId);
    if(c){ c.img=dataUrl; }
    cropModal.classList.add('hidden');
    if(!cardModal.classList.contains('hidden')){
      modalImg.src=dataUrl; modalImg.style.display='block'; modalPlus.style.display='none';
    }
    renderAll();
  });

})();
</script>
</body>
</html>
